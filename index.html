<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tarte Time</title>
<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: system-ui, sans-serif;
    color: #fff7df;
    overflow: hidden;
    background:
      radial-gradient(circle at top, rgba(255,220,150,.25), transparent 35%),
      linear-gradient(135deg, #27160d, #5a3218 45%, #14100d);
  }

  .scene {
    min-height: 100vh;
    display: grid;
    place-items: center;
    position: relative;
    padding: 2rem;
  }

  .bistro {
    max-width: 850px;
    width: 100%;
    padding: 2rem;
    border: 3px solid #c99a45;
    border-radius: 32px;
    text-align: center;
    background: rgba(35, 18, 10, .78);
    box-shadow: 0 0 50px rgba(0,0,0,.6), inset 0 0 30px rgba(255,190,90,.15);
    backdrop-filter: blur(8px);
    z-index: 2;
  }

  h1 {
    font-size: clamp(3rem, 8vw, 7rem);
    margin: 0;
    letter-spacing: .04em;
    text-shadow: 0 5px 0 #5d2d13;
  }

  .subtitle {
    font-size: clamp(1rem, 3vw, 1.5rem);
    margin: .5rem 0 2rem;
  }

  .timer {
    font-size: clamp(2.6rem, 9vw, 6rem);
    font-weight: 900;
    background: #130b07;
    border: 2px solid #d9a441;
    border-radius: 20px;
    padding: 1rem;
    box-shadow: inset 0 0 25px #000;
    font-variant-numeric: tabular-nums;
  }

  .status {
    margin-top: 1.3rem;
    font-size: 1.3rem;
  }

  button {
    margin-top: 1.5rem;
    padding: 1rem 1.4rem;
    border: 0;
    border-radius: 999px;
    cursor: pointer;
    font-weight: 900;
    font-size: 1rem;
    background: linear-gradient(#ffd36e, #b56d1d);
    color: #2b1308;
    box-shadow: 0 8px 0 #6e3a13;
  }

  button:active { transform: translateY(6px); box-shadow: 0 2px 0 #6e3a13; }

  .gear {
    position: absolute;
    width: 140px;
    height: 140px;
    border: 18px dashed rgba(220,160,60,.7);
    border-radius: 50%;
    animation: spin 12s linear infinite;
    opacity: .65;
  }

  .gear.one { top: 8%; left: 7%; }
  .gear.two { right: 8%; bottom: 10%; width: 190px; height: 190px; animation-duration: 18s; animation-direction: reverse; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .steam {
    position: absolute;
    bottom: -80px;
    width: 90px;
    height: 180px;
    border-radius: 50%;
    background: rgba(255,255,255,.18);
    filter: blur(18px);
    animation: steam 7s infinite ease-in;
  }

  .steam.s1 { left: 18%; animation-delay: 0s; }
  .steam.s2 { left: 50%; animation-delay: 2s; }
  .steam.s3 { right: 18%; animation-delay: 4s; }

  @keyframes steam {
    from { transform: translateY(0) scale(.7); opacity: 0; }
    30% { opacity: .8; }
    to { transform: translateY(-110vh) scale(1.8); opacity: 0; }
  }

  .tarte {
    position: absolute;
    font-size: 3rem;
    animation: fly 14s linear infinite;
    z-index: 1;
  }

  .t1 { top: 15%; left: -80px; animation-delay: 0s; }
  .t2 { top: 65%; left: -80px; animation-delay: 5s; }
  .t3 { top: 35%; left: -80px; animation-delay: 9s; }

  @keyframes fly {
    from { transform: translateX(-10vw) rotate(0deg); }
    to { transform: translateX(115vw) rotate(720deg); }
  }

  .airship {
    position: absolute;
    top: 7%;
    left: -250px;
    font-size: 4rem;
    animation: airship 28s linear infinite;
  }

  @keyframes airship {
    to { transform: translateX(130vw); }
  }

  .alarm {
    animation: alarmPulse .35s infinite alternate;
  }

  @keyframes alarmPulse {
    from { background-color: #5a140b; }
    to { background-color: #b32613; }
  }

  .ticker {
    position: fixed;
    bottom: 0;
    width: 100%;
    padding: .7rem;
    background: #120906;
    border-top: 2px solid #c99a45;
    white-space: nowrap;
    overflow: hidden;
    z-index: 5;
  }

  .ticker span {
    display: inline-block;
    padding-left: 100%;
    animation: ticker 20s linear infinite;
  }

  @keyframes ticker {
    to { transform: translateX(-100%); }
  }
</style>
</head>

<body>
  <div class="scene" id="scene">
    <div class="gear one"></div>
    <div class="gear two"></div>

    <div class="steam s1"></div>
    <div class="steam s2"></div>
    <div class="steam s3"></div>

    <div class="airship">🛩️</div>
    <div class="tarte t1">🥧</div>
    <div class="tarte t2">🍋</div>
    <div class="tarte t3">🍫</div>

    <main class="bistro">
      <h1>Tarte Time</h1>
      <p class="subtitle">French Kiss Bistro · Time Machine Restaurant Edition</p>

      <div class="timer" id="timer">--:--:--</div>
      <div class="status" id="status">Calculating tarte coordinates...</div>

      <button onclick="manualAlarm()">MANUAL TARTE ALARM 🚨🥧</button>
    </main>
  </div>

  <div class="ticker">
    <span>⚙️ Lemon Tarte detected · Chocolate Tarte pressure rising · Berry Tarte velocity unstable · Prepare forks immediately ⚙️</span>
  </div>

<script>
  const TARTE_HOUR = 15;
  const TARTE_MINUTE = 0;

  const timer = document.getElementById("timer");
  const status = document.getElementById("status");
  const scene = document.getElementById("scene");

  function getNextTarteTime() {
    const now = new Date();
    const target = new Date();

    target.setHours(TARTE_HOUR, TARTE_MINUTE, 0, 0);

    if (now > target) {
      target.setDate(target.getDate() + 1);
    }

    return target;
  }

  function updateTimer() {
    const now = new Date();
    const target = getNextTarteTime();
    const diff = target - now;

    const hours = Math.floor(diff / 1000 / 60 / 60);
    const minutes = Math.floor((diff / 1000 / 60) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    timer.textContent =
      String(hours).padStart(2, "0") + ":" +
      String(minutes).padStart(2, "0") + ":" +
      String(seconds).padStart(2, "0");

    if (hours === 0 && minutes === 0) {
      status.textContent = "🚨 TARTE TIME! Drop everything. Forks up!";
      scene.classList.add("alarm");
    } else {
      status.textContent = "Next tarte deployment at 15:00.";
      scene.classList.remove("alarm");
    }
  }

  function manualAlarm() {
    status.textContent = "🚨 MANUAL TARTE OVERRIDE ACTIVATED!";
    scene.classList.add("alarm");

    for (let i = 0; i < 20; i++) {
      const tarte = document.createElement("div");
      tarte.textContent = ["🥧", "🍋", "🍫", "🍓"][Math.floor(Math.random() * 4)];
      tarte.style.position = "fixed";
      tarte.style.left = Math.random() * 100 + "vw";
      tarte.style.top = "-50px";
      tarte.style.fontSize = "2.5rem";
      tarte.style.zIndex = "99";
      tarte.style.animation = "fall 3s linear forwards";
      document.body.appendChild(tarte);

      setTimeout(() => tarte.remove(), 3000);
    }

    setTimeout(() => scene.classList.remove("alarm"), 5000);
  }

  const style = document.createElement("style");
  style.innerHTML = `
    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0;
      }
    }
  `;
  document.head.appendChild(style);

  updateTimer();
  setInterval(updateTimer, 1000);
</script>
</body>
</html>
