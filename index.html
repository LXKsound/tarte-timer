<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>French Kiss · Tarte Time</title>
  <meta name="description" content="French Kiss Bistro tarte time page using the provided artwork as the exact visual base." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <section class="hero" aria-label="French Kiss Tarte Time page">
      <img
        class="hero-image"
        src="assets/french-kiss-reference.png"
        alt="French Kiss Bistro steampunk tarte countdown artwork"
      />

      <!-- Live countdown overlay placed over the timer area in the artwork -->
      <section class="countdown-overlay" aria-live="polite" aria-label="Live tarte countdown">
        <div class="digit-group">
          <div class="digit" id="days">01</div>
          <div class="label">Days</div>
        </div>
        <div class="digit-group">
          <div class="digit" id="hours">23</div>
          <div class="label">Hours</div>
        </div>
        <div class="digit-group">
          <div class="digit" id="minutes">45</div>
          <div class="label">Minutes</div>
        </div>
        <div class="digit-group">
          <div class="digit" id="seconds">17</div>
          <div class="label">Seconds</div>
        </div>
      </section>

      <button class="bell-button" id="bellButton" type="button" aria-label="Ring the tarte bell">
        Ring the tarte bell
      </button>

      <p class="screen-reader-status" id="statusText">
        Daily tarte time is at 15:00.
      </p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
