<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tarte Time</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  overflow: hidden;
  font-family: system-ui, sans-serif;
  color: #fff3d0;
  background: #120806;
}

.page {
  min-height: 100vh;
  position: relative;
  display: grid;
  place-items: center;
  background:
    linear-gradient(rgba(20,8,4,.25), rgba(20,8,4,.55)),
    url("bistro-bg.png") center / cover no-repeat;
}

.panel {
  width: min(90vw, 760px);
  padding: 2rem;
  text-align: center;
  border-radius: 28px;
  background: rgba(35, 18, 8, .72);
  border: 2px solid rgba(255, 202, 104, .8);
  box-shadow: 0 0 40px rgba(0,0,0,.65);
  backdrop-filter: blur(7px);
  z-index: 5;
}

h1 {
  margin: 0;
  font-size: clamp(3rem, 8vw, 6.5rem);
  text-shadow: 0 5px 0 #5b250f;
}

.subtitle {
  font-size: 1.2rem;
  margin-bottom: 1.5rem;
}

.timer {
  font-size: clamp(3rem, 9vw, 6rem);
  font-weight: 900;
  font-variant-numeric: tabular-nums;
  padding: 1rem;
  border-radius: 20px;
  background: rgba(10,4,2,.9);
  border: 2px solid #ffc45c;
  box-shadow: inset 0 0 20px #000;
}

.status {
  margin-top: 1rem;
  font-size: 1.25rem;
}

button {
  margin-top: 1.4rem;
  padding: .9rem 1.4rem;
  border: none;
  border-radius: 999px;
  font-weight: 900;
  cursor: pointer;
  background: linear-gradient(#ffe08a, #c87920);
  color: #2a1004;
}

/* animated overlays */
.gear {
  position: absolute;
  border: 16px dashed rgba(230,170,65,.75);
  border-radius: 50%;
  opacity: .55;
  animation: spin 16s linear infinite;
  z-index: 2;
}

.g1 { width: 160px; height: 160px; left: 4%; top: 8%; }
.g2 { width: 220px; height: 220px; right: 5%; bottom: 8%; animation-direction: reverse; }

@keyframes spin {
  to { transform: rotate(360deg); }
}

.steam {
  position: absolute;
  bottom: -120px;
  width: 90px;
  height: 220px;
  border-radius: 50%;
  background: rgba(255,255,255,.18);
  filter: blur(22px);
  animation: steam 7s infinite ease-in;
  z-index: 3;
}

.s1 { left: 20%; }
.s2 { left: 48%; animation-delay: 2s; }
.s3 { right: 18%; animation-delay: 4s; }

@keyframes steam {
  from { transform: translateY(0) scale(.7); opacity: 0; }
  30% { opacity: .8; }
  to { transform: translateY(-110vh) scale(1.8); opacity: 0; }
}

.flying {
  position: absolute;
  left: -80px;
  font-size: 3rem;
  animation: fly 13s linear infinite;
  z-index: 4;
}

.f1 { top: 18%; }
.f2 { top: 58%; animation-delay: 5s; }
.f3 { top: 35%; animation-delay: 9s; }

@keyframes fly {
  to { transform: translateX(120vw) rotate(720deg); }
}

.alarm {
  animation: alarm .35s infinite alternate;
}

@keyframes alarm {
  from { filter: saturate(1); }
  to { filter: saturate(1.8) brightness(1.15); }
}
</style>
</head>

<body>
<div class="page" id="page">
  <div class="gear g1"></div>
  <div class="gear g2"></div>

  <div class="steam s1"></div>
  <div class="steam s2"></div>
  <div class="steam s3"></div>

  <div class="flying f1">🥧</div>
  <div class="flying f2">🍋</div>
  <div class="flying f3">🍫</div>

  <main class="panel">
    <h1>Tarte Time</h1>
    <p class="subtitle">French Kiss Bistro · Time Machine Restaurant</p>
    <div class="timer" id="timer">--:--:--</div>
    <div class="status" id="status">Next tarte deployment at 15:00.</div>
    <button onclick="manualAlarm()">MANUAL TARTE ALARM 🚨🥧</button>
  </main>
</div>

<script>
const TARTE_HOUR = 15;
const TARTE_MINUTE = 0;

const timer = document.getElementById("timer");
const status = document.getElementById("status");
const page = document.getElementById("page");

function nextTarteTime() {
  const now = new Date();
  const target = new Date();
  target.setHours(TARTE_HOUR, TARTE_MINUTE, 0, 0);
  if (now > target) target.setDate(target.getDate() + 1);
  return target;
}

function updateTimer() {
  const now = new Date();
  const target = nextTarteTime();
  const diff = target - now;

  const h = Math.floor(diff / 1000 / 60 / 60);
  const m = Math.floor((diff / 1000 / 60) % 60);
  const s = Math.floor((diff / 1000) % 60);

  timer.textContent =
    String(h).padStart(2, "0") + ":" +
    String(m).padStart(2, "0") + ":" +
    String(s).padStart(2, "0");

  if (h === 0 && m === 0) {
    status.textContent = "🚨 TARTE TIME! Forks up!";
    page.classList.add("alarm");
  } else {
    status.textContent = "Next tarte deployment at 15:00.";
    page.classList.remove("alarm");
  }
}

function manualAlarm() {
  status.textContent = "🚨 MANUAL TARTE OVERRIDE ACTIVATED!";
  page.classList.add("alarm");
  setTimeout(() => page.classList.remove("alarm"), 5000);
}

updateTimer();
setInterval(updateTimer, 1000);
</script>
</body>
</html>
